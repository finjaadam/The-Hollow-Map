name: "godot-ci export"
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version (e.g. v1.0.0)"
        required: true
        default: "v0.0.0"

env:
  GODOT_VERSION: 4.6.3
  EXPORT_NAME: "The-Hollow-Map"
  PROJECT_PATH: .
  VERSION: ${{ github.event.inputs.version }}

jobs:
  validate-version:
    name: Validate Version
    runs-on: ubuntu-24.04
    steps:
      - name: Check version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '${{ github.event.inputs.version }}'. Expected format: vX.Y.Z (e.g. v1.0.0)"
            exit 1
          fi

  import-assets:
    name: Import Assets
    runs-on: ubuntu-24.04
    needs: validate-version
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Import Assets
        run: |
          cd $PROJECT_PATH
          godot --headless --verbose --editor --quit
      - name: Cache Imported Assets
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: ${{ runner.os }}-godot-imported-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', '**/*.otf', '**/*.ttf', '**/*.png', '**/*.mp3') }}

  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04
    needs: import-assets
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Restore Imported Assets
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: ${{ runner.os }}-godot-imported-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', '**/*.otf', '**/*.ttf', '**/*.png', '**/*.mp3') }}
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Windows Desktop" "$EXPORT_DIR/windows/${EXPORT_NAME}.exe"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows

  export-linux:
    name: Linux Export
    runs-on: ubuntu-24.04
    needs: import-assets
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Restore Imported Assets
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: ${{ runner.os }}-godot-imported-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', '**/*.otf', '**/*.ttf', '**/*.png', '**/*.mp3') }}
      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Linux" "$EXPORT_DIR/linux/${EXPORT_NAME}.x86_64"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/linux

  export-mac:
    name: Mac Export
    runs-on: ubuntu-24.04
    needs: import-assets
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Restore Imported Assets
        uses: actions/cache@v4
        with:
          path: .godot/imported/
          key: ${{ runner.os }}-godot-imported-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', '**/*.otf', '**/*.ttf', '**/*.png', '**/*.mp3') }}
      - name: Mac Build
        run: |
          mkdir -v -p build/mac
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "macOS" "$EXPORT_DIR/mac/${EXPORT_NAME}_${VERSION}_macos.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: build/mac

  release:
    name: Create Draft Release
    runs-on: ubuntu-24.04
    needs: [export-windows, export-linux, export-mac]
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: build/windows
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: build/linux
      - name: Download Mac Artifact
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: build/mac
      - name: Zip Windows Build
        run: |
          cd build/windows
          zip -r "../${EXPORT_NAME}_${VERSION}_windows.zip" .
      - name: Zip Linux Build
        run: |
          cd build/linux
          zip -r "../${EXPORT_NAME}_${VERSION}_linux.zip" .
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.event.inputs.version }}
          name: "${{ env.EXPORT_NAME }} ${{ github.event.inputs.version }}"
          files: |
            build/${{ env.EXPORT_NAME }}_${{ env.VERSION }}_windows.zip
            build/${{ env.EXPORT_NAME }}_${{ env.VERSION }}_linux.zip
            build/mac/${{ env.EXPORT_NAME }}_${{ env.VERSION }}_macos.zip
