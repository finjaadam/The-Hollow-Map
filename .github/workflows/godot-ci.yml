name: "godot-ci export"  
on: workflow_dispatch  
  
env:  
  GODOT_VERSION: 4.6.3  
  EXPORT_NAME: "The-Hollow-Map"  
  PROJECT_PATH: .  
  
jobs:  
  import-assets:  
    name: Import Assets  
    runs-on: ubuntu-24.04  
    container:  
      image: barichello/godot-ci:4.6.3  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4  
        with:  
          lfs: true  
      - name: Setup  
        run: |  
          mkdir -v -p ~/.local/share/godot/export_templates/  
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable  
      - name: Import Assets  
        run: |  
          cd $PROJECT_PATH  
          godot --headless --verbose --editor --quit  
      - name: Cache Imported Assets  
        uses: actions/cache@v4  
        with:  
          path: .godot/imported/  
          key: ${{ runner.os }}-godot-imported-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', '**/*.otf', '**/*.ttf', '**/*.png', '**/*.mp3') }}  
  
  export-windows:  
    name: Windows Export  
    runs-on: ubuntu-24.04  
    needs: import-assets  
    container:  
      image: barichello/godot-ci:4.6.3  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4  
        with:  
          lfs: true  
      - name: Setup  
        run: |  
          mkdir -v -p ~/.local/share/godot/export_templates/  
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable  
      - name: Restore Imported Assets  
        uses: actions/cache@v4  
        with:  
          path: .godot/imported/  
          key: ${{ runner.os }}-godot-imported-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', '**/*.otf', '**/*.ttf', '**/*.png', '**/*.mp3') }}  
      - name: Windows Build  
        run: |  
          mkdir -v -p build/windows  
          EXPORT_DIR="$(readlink -f build)"  
          cd $PROJECT_PATH  
          godot --headless --verbose --export-release "Windows Desktop" "$EXPORT_DIR/windows/$EXPORT_NAME.exe"  
      - name: Upload Artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: windows  
          path: build/windows  
  
  export-linux:  
    name: Linux Export  
    runs-on: ubuntu-24.04  
    needs: import-assets  
    container:  
      image: barichello/godot-ci:4.6.3  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4  
        with:  
          lfs: true  
      - name: Setup  
        run: |  
          mkdir -v -p ~/.local/share/godot/export_templates/  
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable  
      - name: Restore Imported Assets  
        uses: actions/cache@v4  
        with:  
          path: .godot/imported/  
          key: ${{ runner.os }}-godot-imported-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', '**/*.otf', '**/*.ttf', '**/*.png', '**/*.mp3') }}  
      - name: Linux Build  
        run: |  
          mkdir -v -p build/linux  
          EXPORT_DIR="$(readlink -f build)"  
          cd $PROJECT_PATH  
          godot --headless --verbose --export-release "Linux" "$EXPORT_DIR/linux/$EXPORT_NAME.x86_64"  
      - name: Upload Artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: linux  
          path: build/linux  
  
  export-mac:  
    name: Mac Export  
    runs-on: ubuntu-24.04  
    needs: import-assets  
    container:  
      image: barichello/godot-ci:4.6.3  
    steps:  
      - name: Checkout  
        uses: actions/checkout@v4  
        with:  
          lfs: true  
      - name: Setup  
        run: |  
          mkdir -v -p ~/.local/share/godot/export_templates/  
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable  
      - name: Restore Imported Assets  
        uses: actions/cache@v4  
        with:  
          path: .godot/imported/  
          key: ${{ runner.os }}-godot-imported-${{ hashFiles('**/*.tscn', '**/*.tres', '**/*.gd', '**/*.otf', '**/*.ttf', '**/*.png', '**/*.mp3') }}  
      - name: Mac Build  
        run: |  
          mkdir -v -p build/mac  
          EXPORT_DIR="$(readlink -f build)"  
          cd $PROJECT_PATH  
          godot --headless --verbose --export-release "macOS" "$EXPORT_DIR/mac/$EXPORT_NAME.zip"  
      - name: Upload Artifact  
        uses: actions/upload-artifact@v4  
        with:  
          name: mac  
          path: build/mac
